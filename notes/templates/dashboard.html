<!DOCTYPE html>
<html>
<head>
    <title>Lecture Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">Lecture Dashboard</h1>
    <div class="row mb-4">

    <div class="col-md-6">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5>Total Lectures</h5>
                <h2>{{ total_lectures }}</h2>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card text-center shadow">
            <div class="card-body">
                <h5>Total Words</h5>
                <h2>{{ total_words }}</h2>
            </div>
        </div>
    </div>

</div>

    <form method="GET" class="mb-4">

        <div class="input-group">

            <input
                type="text"
                name="q"
                class="form-control"
                placeholder="Search transcripts..."
                value="{{ query|default:'' }}"
            >

            <button class="btn btn-primary">
                Search
            </button>

        </div>

    </form>

    <table class="table table-bordered table-striped">

        <thead>
            <tr>
                <th>File Name</th>
                <th>Date Uploaded</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>

        {% for lecture in lectures %}

            <tr>
                <td>{{ lecture.filename }}</td>
                <td>{{ lecture.created_at }}</td>

                <td>
                    <a href="/lecture/{{ lecture.id }}/"
                       class="btn btn-success btn-sm">
                       View
                    </a>
                </td>
            </tr>

        {% empty %}

            <tr>
                <td colspan="3">
                    No matching lectures found.
                </td>
            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
